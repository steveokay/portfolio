<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Subtle blueprint dots -->
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#d8d3c5"/>
    </pattern>

    <!-- Right-side accent illustration: small architecture motif -->
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#faf8f4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#faf8f4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Cream background -->
  <rect width="1200" height="630" fill="#faf8f4"/>

  <!-- Dot grid backdrop -->
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.55"/>

  <!-- Right side: faint architecture diagram motif (boxes + accent edge) -->
  <g opacity="0.55" font-family="ui-monospace, Menlo, monospace" font-size="14">
    <!-- node row 1 -->
    <rect x="780" y="120" width="120" height="44" rx="2" fill="#faf8f4" stroke="#d8d3c5" stroke-width="1"/>
    <text x="792" y="140" fill="#1a1c1f" font-size="13">github</text>
    <text x="792" y="156" fill="#5a5e63" font-size="11">repo · main</text>

    <rect x="940" y="120" width="160" height="44" rx="2" fill="#faf8f4" stroke="#d8d3c5" stroke-width="1"/>
    <text x="952" y="140" fill="#1a1c1f" font-size="13">github actions</text>
    <text x="952" y="156" fill="#5a5e63" font-size="11">build · test · deploy</text>

    <line x1="900" y1="142" x2="940" y2="142" stroke="#d8d3c5" stroke-width="1"/>

    <!-- node row 2 -->
    <rect x="780" y="220" width="120" height="44" rx="2" fill="#faf8f4" stroke="#d8d3c5" stroke-width="1"/>
    <text x="792" y="240" fill="#1a1c1f" font-size="13">route 53</text>
    <text x="792" y="256" fill="#5a5e63" font-size="11">dns</text>

    <rect x="940" y="220" width="120" height="44" rx="2" fill="#faf8f4" stroke="#d8d3c5" stroke-width="1"/>
    <text x="952" y="240" fill="#1a1c1f" font-size="13">cloudfront</text>
    <text x="952" y="256" fill="#5a5e63" font-size="11">cdn · waf</text>

    <line x1="900" y1="242" x2="940" y2="242" stroke="#0d5e5e" stroke-width="1.5"/>

    <!-- node row 3 (accent box) -->
    <rect x="860" y="320" width="160" height="50" rx="2" fill="#faf8f4" stroke="#0d5e5e" stroke-width="1.5"/>
    <text x="872" y="342" fill="#1a1c1f" font-size="14" font-weight="500">ecs fargate</text>
    <text x="872" y="358" fill="#5a5e63" font-size="11">go / node · autoscale</text>

    <line x1="940" y1="264" x2="940" y2="320" stroke="#0d5e5e" stroke-width="1.5"/>

    <!-- node row 4 -->
    <rect x="780" y="420" width="120" height="44" rx="2" fill="#faf8f4" stroke="#d8d3c5" stroke-width="1"/>
    <text x="792" y="440" fill="#1a1c1f" font-size="13">rds aurora</text>
    <text x="792" y="456" fill="#5a5e63" font-size="11">postgres</text>

    <rect x="940" y="420" width="120" height="44" rx="2" fill="#faf8f4" stroke="#d8d3c5" stroke-width="1"/>
    <text x="952" y="440" fill="#1a1c1f" font-size="13">datadog</text>
    <text x="952" y="456" fill="#5a5e63" font-size="11">apm · traces</text>

    <line x1="940" y1="370" x2="940" y2="420" stroke="#5a5e63" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="940" y1="370" x2="840" y2="420" stroke="#5a5e63" stroke-width="1"/>
  </g>

  <!-- Fade right-side motif into the title side -->
  <rect x="600" y="0" width="200" height="630" fill="url(#fade)"/>

  <!-- LEFT — text content -->
  <g>
    <!-- eyebrow -->
    <text x="80" y="160" font-family="ui-monospace, Menlo, monospace"
          font-size="20" fill="#5a5e63" letter-spacing="3">CLOUD · PLATFORM · AWS</text>

    <!-- name -->
    <text x="80" y="280" font-family="Georgia, 'Instrument Serif', serif"
          font-size="108" fill="#1a1c1f" letter-spacing="-2">Steve Okoth</text>

    <!-- role -->
    <text x="80" y="350" font-family="Georgia, 'Instrument Serif', serif"
          font-size="44" font-style="italic" fill="#5a5e63">Cloud &amp; Platform Engineer</text>

    <!-- tagline -->
    <text x="80" y="460" font-family="ui-monospace, Menlo, monospace"
          font-size="22" fill="#1a1c1f">Building AWS platforms — quietly reliable.</text>
    <text x="80" y="490" font-family="ui-monospace, Menlo, monospace"
          font-size="22" fill="#1a1c1f">Cost-aware, observable, boring on purpose.</text>

    <!-- status line -->
    <circle cx="90" cy="558" r="5" fill="#0d5e5e"/>
    <text x="108" y="564" font-family="ui-monospace, Menlo, monospace"
          font-size="18" fill="#5a5e63" letter-spacing="2">PORTFOLIO.MOKAYSTEVE.WORKERS.DEV</text>
  </g>
</svg>
